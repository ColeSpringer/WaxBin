name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0" # WaxBin is strictly no-CGO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: No-CGO invariant
        # The shipped binaries must never link cgo. CGO_ENABLED=0 is the job
        # default, so this asserts no package pulled runtime/cgo into the graph.
        run: |
          go build ./...
          if go list -deps ./... | grep -qx runtime/cgo; then
            echo "runtime/cgo is linked into a CGO_ENABLED=0 build"; exit 1
          fi

      - name: Test (race)
        # The race detector needs cgo; scope it to the test toolchain only so the
        # shipped binaries stay pure no-CGO.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...
